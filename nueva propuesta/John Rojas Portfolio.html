const useInView = () => {
  const ref = React.useRef(null);
  const [vis, setVis] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting){setVis(true);obs.disconnect();} },{threshold:0.1});
    obs.observe(ref.current);
    return () => obs.disconnect();
  },[]);
  return [ref, vis];
};

/* ── APP ────────────────────────────────────────────── */

const SAVED = JSON.parse(localStorage.getItem('jjdev_tweaks')||'null') || TWEAK_DEFAULTS;

function App() {
  const [tweaks,setTweaks]=React.useState(SAVED);
  const [active,setActive]=React.useState('home');
  const [editMode,setEditMode]=React.useState(false);

  React.useEffect(()=>{
    document.documentElement.style.setProperty('--accent',tweaks.accent);
    document.documentElement.style.setProperty('--accent2',tweaks.accent2||'#a78bfa');
    localStorage.setItem('jjdev_tweaks',JSON.stringify(tweaks));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*');
  },[tweaks]);

  React.useEffect(()=>{
    const handler=e=>{
      if(e.data?.type==='__activate_edit_mode') setEditMode(true);
      if(e.data?.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  React.useEffect(()=>{
    const ids=['home','about','skills','experience','education','certifications','services','portfolio','testimonials','blog','contact'];
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); });
    },{rootMargin:'-40% 0px -55% 0px'});
    ids.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  return (
    <div>
      <Nav active={active}/>
      <Hero/>
      <About/>
      <Skills/>
      <TimelineSection id="experience" sub="where i've worked" title="Experience" items={EXPERIENCE}/>
      <TimelineSection id="education" sub="my academic path" title="Education" items={EDUCATION} altBg/>
      {tweaks.showCertifications && <Certifications/>}
      <Services/>
      <Portfolio/>
      <Testimonials/>
      {tweaks.showBlog && <Blog/>}
      <Contact/>
      <Footer/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} show={editMode}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
