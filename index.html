    <div class="container">
      <div class="section-header">
        <span class="section-label" data-i18n="contact.label"></span>
        <h2 class="section-title" data-i18n="contact.title"></h2>
      </div>

      <div class="contact-grid">

        <!-- Info -->
        <div class="will-reveal-left">
          <p class="contact-desc" data-i18n="contact.desc"></p>
          <div class="contact-info-items">
            <div class="contact-info-item glass">
              <i class="fas fa-phone"></i>
              <div>
                <div class="ci-label" data-i18n="contact.phone"></div>
                <div class="ci-val">+57 321 233 5821</div>
              </div>
            </div>
            <div class="contact-info-item glass">
              <i class="fas fa-envelope"></i>
              <div>
                <div class="ci-label" data-i18n="contact.email"></div>
                <div class="ci-val">jhonrojas0628@hotmail.com</div>
              </div>
            </div>
            <div class="contact-info-item glass">
              <i class="fas fa-map-marker-alt"></i>
              <div>
                <div class="ci-label" data-i18n="contact.location"></div>
                <div class="ci-val" data-i18n="contact.loc_val"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Form -->
        <form class="contact-form glass will-reveal-right"
              action="https://formsubmit.co/jhonrojas220617@gmail.com" method="POST">
          <input type="hidden" name="_next" value="https://johnrojas06289.github.io/PortfolioSecond/pages/thanks.html">
          <input type="hidden" name="_captcha" value="false">
          <input type="text"   name="_honey" style="display:none">

          <div class="form-row">
            <div class="form-group">
              <label data-i18n="contact.name_lbl"></label>
              <input  type="text"  name="name"    class="form-control" required
                      data-i18n-placeholder="contact.name_ph">
            </div>
            <div class="form-group">
              <label data-i18n="contact.email_lbl"></label>
              <input  type="email" name="email"   class="form-control" required
                      data-i18n-placeholder="contact.email_ph">
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="contact.subject_lbl"></label>
            <input type="text" name="subject" class="form-control" required
                   data-i18n-placeholder="contact.subject_ph">
          </div>
          <div class="form-group">
            <label data-i18n="contact.msg_lbl"></label>
            <textarea name="message" class="form-control" rows="5" required
                      data-i18n-placeholder="contact.msg_ph"></textarea>
          </div>
          <button type="submit" class="btn btn-primary form-submit" data-i18n="contact.send"></button>
        </form>

      </div>
    </div>
  </section>
